<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #ffefd5, #ffd1dc 45%, #f8b195 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
      max-width: 700px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 3rem;
      color: #d6336c;
    }
    p {
      margin: 0 0 24px;
      font-size: 1.1rem;
      line-height: 1.8;
    }
    .wish {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9a8b, #ff6f91);
      color: white;
      font-weight: 700;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 20px rgba(255, 105, 135, 0.25);
    }
    .balloons {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      justify-items: center;
    }
    .balloon {
      position: relative;
      width: 80px;
      height: 110px;
      border-radius: 50% 50% 50% 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #ff7eb9 40%, #ff4f79 100%);
      box-shadow: inset -8px -8px 20px rgba(255,255,255,0.35), 0 12px 25px rgba(0,0,0,0.12);
    }
    .balloon:after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -18px;
      width: 16px;
      height: 18px;
      background: inherit;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 4px;
    }
    .balloon:before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -54px;
      width: 2px;
      height: 50px;
      background: rgba(0, 0, 0, 0.2);
    }
    @media (max-width: 600px) {
      .balloons {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Birthday!</h1>
    <p>Wishing you a day filled with love, laughter, and unforgettable memories. May this year bring you endless joy, exciting adventures, and every success you deserve.</p>
    <div class="wish">Enjoy every moment today!</div>
    <div class="balloons">
      <div class="balloon"></div>
      <div class="balloon"></div>
      <div class="balloon"></div>
    </div>
  </div>
</body>
</html>
